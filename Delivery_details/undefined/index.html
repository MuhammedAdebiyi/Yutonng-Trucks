<html lang="en"><head>
<script id="yutonng-nav-fix">
(function(){
    // Stub platform functions so nav JS doesn't crash
    window.isFrontEnv = function(){ return false; };
    window.isMo       = function(){ return window.innerWidth <= 992; };
    window.sensors    = window.sensors || { track: function(){} };

    // Fix logo text injected by JS
    function fixText(){
        document.querySelectorAll('*').forEach(function(el){
            if(el.childElementCount === 0 && el.textContent){
                if(el.textContent.trim() === 'FAW TRUCKS'){
                    el.textContent = 'YUTONNG TRUCK';
                } else if(el.textContent.trim() === 'FAW Trucks'){
                    el.textContent = 'Yutonng Truck';
                }
            }
        });
    }

    // Fix mobile nav after DOM is ready
    function fixNav(){
        fixText();

        // Mobile hamburger button (.p_navButton)
        var btn = document.querySelector('.p_navButton');
        var navContent = document.querySelector('.p_navContent');
        var blackBg = document.querySelector('.p_blackbg');
        var closeBtn = document.querySelector('.p_closeT');

        if(btn && navContent){
            // Remove old listeners by cloning
            var newBtn = btn.cloneNode(true);
            btn.parentNode.replaceChild(newBtn, btn);

            newBtn.addEventListener('click', function(e){
                e.stopPropagation();
                navContent.classList.add('showmenuBox');
                if(blackBg) blackBg.classList.add('showbg');
            });
        }

        if(closeBtn && navContent){
            var newClose = closeBtn.cloneNode(true);
            closeBtn.parentNode.replaceChild(newClose, closeBtn);
            newClose.addEventListener('click', function(){
                navContent.classList.remove('showmenuBox');
                if(blackBg) blackBg.classList.remove('showbg');
            });
        }

        // Close nav when clicking black overlay
        if(blackBg && navContent){
            blackBg.addEventListener('click', function(){
                navContent.classList.remove('showmenuBox');
                blackBg.classList.remove('showbg');
            });
        }

        // Mobile dropdown submenus - clicking arrow icons
        document.querySelectorAll('.p_navItem1 > p .p_jtIcon').forEach(function(icon){
            var newIcon = icon.cloneNode(true);
            icon.parentNode.replaceChild(newIcon, icon);
            newIcon.addEventListener('click', function(e){
                e.stopPropagation();
                var sub = this.closest('.p_navItem1').querySelector('.p_navBox2');
                if(sub){
                    sub.style.display = sub.style.display === 'block' ? 'none' : 'block';
                }
                this.classList.toggle('rotate');
            });
        });

        document.querySelectorAll('.p_navItem2 > p .p_jtIcon').forEach(function(icon){
            var newIcon = icon.cloneNode(true);
            icon.parentNode.replaceChild(newIcon, icon);
            newIcon.addEventListener('click', function(e){
                e.stopPropagation();
                var sub = this.closest('.p_navItem2').querySelector('.p_level3Box');
                if(sub){
                    sub.style.display = sub.style.display === 'block' ? 'none' : 'block';
                }
                this.classList.toggle('rotate');
            });
        });

        // Also make nav items with children expandable on mobile tap
        document.querySelectorAll('.p_navItem1 > p').forEach(function(item){
            item.addEventListener('click', function(e){
                if(window.innerWidth <= 992){
                    var sub = this.closest('.p_navItem1').querySelector('.p_navBox2');
                    if(sub && !e.target.tagName.match(/^A$/i)){
                        e.preventDefault();
                        sub.style.display = sub.style.display === 'block' ? 'none' : 'block';
                    }
                }
            });
        });
    }

    // Suppress RequireJS mismatch errors silently
    window.onerror = function(msg, src, line, col, err){
        if(!msg) return false;
        if(msg.indexOf('Mismatched') > -1 ||
           msg.indexOf('isFrontEnv') > -1 ||
           msg.indexOf('isMo is not') > -1){
            return true;
        }
    };

    // Run on DOM ready and after JS finishes
    if(document.readyState === 'loading'){
        document.addEventListener('DOMContentLoaded', fixNav);
    } else {
        fixNav();
    }
    setTimeout(fixNav, 800);
    setTimeout(fixNav, 2000);
    window.addEventListener('load', fixNav);
})();
</script>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>

<style id="yutonng-safari-fix">
/* ── Safari / iOS fixes ─────────────────────────────── */

/* Fix blank hero/banner on Safari - often caused by transform issues */
[class*="p_banner"],
[class*="p_loop"],
[class*="p_slide"],
[class*="banner"],
[class*="swiper"],
[class*="slider"] {
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
}

/* Fix background images not showing on Safari */
[class*="p_bg"],
[style*="background-image"] {
    -webkit-background-size: cover !important;
    background-size: cover !important;
}

/* Fix position fixed on iOS (causes blank areas) */
[class*="p_header"],
[class*="p_nav"],
header, nav {
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
}

/* Fix flex display on older Safari */
[class*="p_flex"],
[class*="flexbox"],
.p_item,
.cbox-2-1 {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-flex-wrap: wrap;
    flex-wrap: wrap;
}

/* Fix overflow hidden clipping on iOS */
[class*="p_loop"] *,
[class*="p_banner"] * {
    -webkit-overflow-scrolling: touch;
}

/* Fix the large blue empty space at top on mobile Safari */
body {
    -webkit-overflow-scrolling: touch;
    overflow-x: hidden;
}

/* Fix images not loading on Safari */
img {
    -webkit-transform: translateZ(0);
    transform: translateZ(0);
}

/* Fix blank top section - force min height */
[class*="p_header"] {
    min-height: 60px;
}
</style>
<script id="yutonng-safari-js">
(function(){
    // Detect Safari
    var isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
    var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);

    if(isSafari || isIOS){
        document.documentElement.classList.add('is-safari');

        // Fix blank sections by forcing reflow
        window.addEventListener('load', function(){
            // Force repaint on all major sections
            document.querySelectorAll('[class*="p_banner"],[class*="p_loop"],[class*="p_slide"]').forEach(function(el){
                el.style.webkitTransform = 'translateZ(0)';
                el.style.transform = 'translateZ(0)';
                // Force reflow
                el.offsetHeight;
            });

            // Fix background images on iOS
            document.querySelectorAll('[style*="background-image"]').forEach(function(el){
                var bg = el.style.backgroundImage;
                if(bg){
                    el.style.backgroundSize = 'cover';
                    el.style.webkitBackgroundSize = 'cover';
                }
            });
        });

        // Fix scroll position on iOS - page sometimes loads scrolled down
        window.addEventListener('load', function(){
            setTimeout(function(){
                window.scrollTo(0, 0);
            }, 100);
        });
    }
})();
</script>
