<html lang="en"><head>
<script id="yutonng-name-override">
(function(){
    window.isFrontEnv = function(){ return false; };
    window.isMo = function(){ return window.innerWidth <= 992; };
    window.sensors = window.sensors || { track: function(){} };

    // Override the global site config object before JS reads it
    window.__siteConfig = window.__siteConfig || {};
    window.__siteConfig.siteName = "YUTONNG TRUCK COMPANY";
    window.__siteConfig.siteTitle = "YUTONNG TRUCK COMPANY";

    // Intercept ALL XHR requests
    var _open = XMLHttpRequest.prototype.open;
    var _send = XMLHttpRequest.prototype.send;
    
    XMLHttpRequest.prototype.open = function(m, url){
        this._url = url || '';
        return _open.apply(this, arguments);
    };
    
    XMLHttpRequest.prototype.send = function(body){
        var self = this;
        var url = self._url || '';
        if(url.indexOf('baseConfig') > -1 || url.indexOf('fwebapi') > -1){
            var fakeResp = '{"code":0,"data":{"siteName":"YUTONNG TRUCK COMPANY","siteTitle":"YUTONNG TRUCK COMPANY","logo":"","icp":"","copyright":"2025 YUTONNG TRUCK COMPANY"}}';
            setTimeout(function(){
                try {
                    Object.defineProperty(self, 'readyState', { get: function(){ return 4; }, configurable: true });
                    Object.defineProperty(self, 'status',    { get: function(){ return 200; }, configurable: true });
                    Object.defineProperty(self, 'responseText', { get: function(){ return fakeResp; }, configurable: true });
                    Object.defineProperty(self, 'response',    { get: function(){ return fakeResp; }, configurable: true });
                    if(typeof self.onreadystatechange === 'function') self.onreadystatechange();
                    if(typeof self.onload === 'function') self.onload();
                } catch(e){}
            }, 5);
            return;
        }
        return _send.apply(this, arguments);
    };

    // Intercept fetch
    if(window.fetch){
        var _fetch = window.fetch;
        window.fetch = function(url, opts){
            if(typeof url === 'string' && (url.indexOf('baseConfig') > -1 || url.indexOf('fwebapi') > -1)){
                var fakeResp = '{"code":0,"data":{"siteName":"YUTONNG TRUCK COMPANY","siteTitle":"YUTONNG TRUCK COMPANY"}}';
                return Promise.resolve(new Response(fakeResp, {status:200, headers:{'Content-Type':'application/json'}}));
            }
            return _fetch.apply(this, arguments);
        };
    }

    // DOM watcher - aggressively replace FAW text
    function replaceFAW(){
        var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
        var node;
        while(node = walker.nextNode()){
            if(node.nodeValue && node.nodeValue.indexOf('FAW') > -1){
                node.nodeValue = node.nodeValue
                    .replace(/YUTONNG TRUCK INTERNATIONAL CO\., LTD\./g, 'YUTONNG TRUCK COMPANY')
                    .replace(/YUTONNG TRUCK/g, 'YUTONNG TRUCK')
                    .replace(/Yutonng Truck/g, 'Yutonng Truck')
                    .replace(/FAW TRUCK/g, 'YUTONNG TRUCK')
                    .replace(/Yutonng Truck/g, 'Yutonng Truck');
            }
        }
    }

    // Fix mobile nav
    function fixNav(){
        var btn = document.querySelector('.p_navButton');
        var nav = document.querySelector('.p_navContent');
        var bg  = document.querySelector('.p_blackbg');
        var cls = document.querySelector('.p_closeT');

        if(btn && nav){
            btn.onclick = function(e){
                e.stopPropagation();
                nav.classList.add('showmenuBox');
                if(bg) bg.classList.add('showbg');
            };
        }
        if(cls && nav){
            cls.onclick = function(){
                nav.classList.remove('showmenuBox');
                if(bg) bg.classList.remove('showbg');
            };
        }
        if(bg && nav){
            bg.onclick = function(){
                nav.classList.remove('showmenuBox');
                bg.classList.remove('showbg');
            };
        }
    }

    // Suppress errors
    window.onerror = function(msg){
        if(!msg) return false;
        if(msg.indexOf('Mismatched') > -1 || msg.indexOf('isFrontEnv') > -1 ||
           msg.indexOf('isMo is not') > -1) return true;
    };

    document.addEventListener('DOMContentLoaded', function(){ replaceFAW(); fixNav(); });
    window.addEventListener('load', function(){ replaceFAW(); fixNav(); });
    setTimeout(function(){ replaceFAW(); fixNav(); }, 300);
    setTimeout(function(){ replaceFAW(); fixNav(); }, 1000);
    setTimeout(function(){ replaceFAW(); fixNav(); }, 2500);

    // MutationObserver - catches any text injected after load
    var observer = new MutationObserver(function(){ replaceFAW(); });
    document.addEventListener('DOMContentLoaded', function(){
        observer.observe(document.body, { childList: true, subtree: true, characterData: true });
    });
})();
</script>

<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
